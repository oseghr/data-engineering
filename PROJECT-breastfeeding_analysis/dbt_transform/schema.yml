## Step 6 — README (reproducibility = 4pts)

Your README must include these exact sections: **Problem Description, Architecture, Technologies, Dataset, Setup (step-by-step), How to Run, Dashboard Link, Screenshots**. That's what graders look for — a stranger should be able to clone and run it without asking you anything.

---

## Execution Order
```
1. gcloud auth application-default login
2. cd terraform && terraform apply
3. pip install -r requirements.txt
4. python -m ingestion.download_data
5. python -m ingestion.upload_to_gcs
6. bq mk --dataset $GCP_PROJECT:breastfeeding_analytics
7. python orchestration/pipeline_flow.py        # runs full flow once
8. cd dbt_transform && dbt run
9. Open Looker Studio → build 2 tiles
10. Write README → push to GitHub