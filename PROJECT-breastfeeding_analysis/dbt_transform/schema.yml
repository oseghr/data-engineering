version: 2

sources:
  - name: breastfeeding_analytics
    database: "{{ env_var('GCP_PROJECT') }}"
    schema: breastfeeding_analytics
    tables:
      - name: raw_bf_rates

models:
  - name: stg_breastfeeding
    description: "Cleaned UNICEF infant feeding data"
    columns:
      - name: country_code
        tests: [not_null]
      - name: rate_pct
        tests: [not_null]

  - name: fact_bf_rates
    description: "Partitioned fact table for dashboard consumption"
    columns:
      - name: record_id
        tests: [unique, not_null]
```

---

## Step 5 — Dashboard (Looker Studio)

Connect BigQuery → Looker Studio → `fact_bf_rates`. Build exactly these two tiles:

| Tile | Chart type | X-axis | Y-axis | Filter |
|---|---|---|---|---|
| 1 | Geo map or bar | country_name | rate_pct | indicator = Exclusive BF, year = latest |
| 2 | Line chart | year | avg(rate_pct) | indicator = Exclusive BF, region = dimension |

Both tiles need: a title, axis labels, a data source note ("Source: UNICEF 2000–2023"), and a region/indicator filter control at the top.

